# Put general config stuff here
# Here's a list of every variable: https://wiki.hyprland.org/Configuring/Variables/

# Monitor configuration is managed by HyprDynamicMonitors
# See: ~/.config/hyprdynamicmonitors/config.toml
# Generated config: ~/.config/hypr/monitors.conf

# monitor=,addreserved, 0, 0, 0, 0 # Custom reserved area

# HDMI monitor (MS Telematica MStar Demo) does not support VRR/Adaptive Sync.
# Override vrr to fullscreen-only mode to prevent repeated DRM errors on HDMI-A-1.
# 0 = disabled, 1 = global, 2 = fullscreen only (safest with mixed monitors)
misc {
    vrr = 2
}
