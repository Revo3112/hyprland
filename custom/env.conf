# ######## AMD Gaming Optimizations #########
# Use RADV (Mesa) Vulkan driver
env = AMD_VULKAN_ICD, RADV
# Enable GPL for faster shader compilation
env = RADV_PERFTEST, gpl
# DXR/Raytracing support
env = VKD3D_CONFIG, dxr
# Async shader compilation for DXVK
env = DXVK_ASYNC, 1
# Disable NVIDIA-specific features in Proton
env = PROTON_ENABLE_NVAPI, 0
# Enable FSR for Wine/Proton games
env = WINE_FULLSCREEN_FSR, 1
