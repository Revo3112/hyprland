# Dynamic Lock System - Automatically follows Quickshell settings
# Scripts read useHyprlock from ~/.config/illogical-impulse/config.json
$lock_cmd = ~/.config/hypr/scripts/dynamic_lock.sh
$suspend_cmd = systemctl suspend || loginctl suspend

general {
    lock_cmd = $lock_cmd
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = ~/.config/hypr/scripts/dynamic_lock_focus.sh
    inhibit_sleep = 3
}


listener {
    timeout = 300 # 5mins
    on-timeout = ~/.config/hypr/scripts/dynamic_lock.sh
}

listener {
    timeout = 600 # 10mins
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 900 # 15mins
    on-timeout = $suspend_cmd
}
